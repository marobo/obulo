{% load i18n %}
{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="{% trans "Let's promote our suco to the world" %}">
        <meta name="keywords" content="{% trans "Suco Obulo, Suku Obulo, Obulo, Atsabe, Timor-Leste, Cultural, Traditional, Nature and Tourism, Heritage" %}">
        <meta name="author" content="Onório de Jesus">
        <meta name="robots" content="index, follow">

        <link rel="canonical" href="https://obulo.onorio.dev/">

        <!-- Open Graph Meta Tags -->
        <meta property="og:site_name" content="Obulo">
        <meta property="og:title" content="Suco Obulo">
        <meta property="og:description" content="{% trans "Let's promote our suco to the world" %}">
        <meta property="og:type" content="website">
        <meta property="og:locale" content="en_US">
        <meta property="og:url" content="https://obulo.onorio.dev/">
        <meta property="og:image" content="https://obulo.onorio.dev/media/obulo_images/lokal_market.jpg">

        <!-- Twitter Meta Tags -->
        <meta name="twitter:site" content="@AfonsoOnorio">
        <meta name="twitter:creator" content="@AfonsoOnorio">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Suco Obulo">
        <meta name="twitter:description" content="{% trans "Let's promote our suco to the world" %}">
        <meta name="twitter:image" content="https://obulo.onorio.dev/media/obulo_images/lokal_market.jpg">

        <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/apple-touch-icon.png' %}">
        <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32x32.png' %}">
        <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon-16x16.png' %}">
        <link rel="manifest" href="{% static 'img/site.webmanifest' %}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link type="text/css" rel="stylesheet" href="{% static 'css/style.css' %}" />

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <script src="{% static 'js/htmx.min.js' %}" defer></script>

        <!-- Global site tag (gtag.js) - Google Analytics -->
        <script async src="https://www.googletagmanager.com/gtag/js?id={{ G_ANALYTIC_CODE }}"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){
                dataLayer.push(arguments);
            }
            gtag('js', new Date());
            gtag('config', '{{ G_ANALYTIC_CODE }}');
        </script>

        {% block title %}
        {% endblock %}

    </head>

    <body class="d-flex flex-column min-vh-100">
        <div id="hx-loading-bar" class="hx-loading-bar" aria-hidden="true"></div>
        {% block header %}
        {% endblock %}

        <div class="container" id="index-content">
        {% block content %}
        {% endblock %}
        </div>

        {% block footer %}
        {% endblock %}

        <script>
            /* HTMX Support */
            document.body.addEventListener('htmx:configRequest', (event) => {
                event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
            });

            (function () {
                const bar = document.getElementById('hx-loading-bar');
                let inflight = 0;
                document.body.addEventListener('htmx:beforeRequest', () => {
                    if (inflight++ === 0) bar.classList.add('is-active');
                });
                document.body.addEventListener('htmx:afterRequest', () => {
                    inflight = Math.max(0, inflight - 1);
                    if (inflight === 0) bar.classList.remove('is-active');
                });
            })();

            /* Back button */
            function goBack() {
                window.history.back();
            }
        </script>

    </body>
</html>
