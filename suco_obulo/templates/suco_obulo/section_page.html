{% extends base_template %}

{% load i18n %}

{% block title %}
    <title>{% trans page_name %}</title>
{% endblock %}

{% block content %}
    <h2 class="page-title">{% trans page_name %}</h2>
    <div class="obulo">
        {% for post in posts %}
            {% if post.page.name == page_name %}
                {% include 'suco_obulo/post_list.html' %}
            {% endif %}
        {% endfor %}
    </div>
{% endblock %}
